  <text x="60" y="68" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="38" fill="#fff" letter-spacing="-1">A+</text>
  <!-- Star accent above text -->
  <g transform="translate(60,34)">
    <polygon points="0,-9 2.6,-3.7 8.6,-2.9 4.3,1.3 5.3,7.2 0,4.5 -5.3,7.2 -4.3,1.3 -8.6,-2.9 -2.6,-3.7" fill="#fff"/>
  </g>
  <!-- Decorative bar below A+ -->
  <rect x="42" y="74" width="36" height="3.5" rx="1.75" fill="#fff" opacity="0.8"/>
